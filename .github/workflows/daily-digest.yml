name: Daily Tech Digest

on:
  schedule:
    # 21:40 UTC = 06:40 KST (next day).
    # Deliberately OFF the top-of-hour (and off 00:00 UTC, the single most
    # congested cron slot) to reduce GitHub's scheduled-run delay, and early
    # enough that the data is ready well before the KST-afternoon enrich step.
    - cron: '40 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Never let two digest runs (e.g. a delayed cron + a manual dispatch) overlap.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    # Bound the known feed-collection hang risk so a stuck run can't burn minutes.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect RSS feeds
        run: npm run digest:collect

      - name: Generate digest posts
        run: npm run digest

      - name: Check for new posts
        id: changes
        run: |
          if [ -n "$(git status --porcelain src/content/posts)" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "No new digest files — nothing to commit."
          fi

      - name: Build PR body
        if: steps.changes.outputs.created == 'true'
        id: body
        run: |
          DATE="${{ steps.changes.outputs.date }}"
          {
            echo "Automated daily tech digest for **${DATE}**."
            echo ""
            echo "Curated from Kubernetes, CNCF, The New Stack, AWS, Google Cloud, OpenAI, Hugging Face, HashiCorp, and Grafana feeds."
            echo ""
            echo "## Headlines"
            # Pull each '### ' headline from the Korean digest as a checklist.
            grep -h '^### ' "src/content/posts/daily-digest-${DATE}.md" \
              | sed 's/^### /- /' || true
            echo ""
            echo "---"
            echo "_🤖 Generated automatically. Review summaries against the original sources before merging._"
          } > pr-body.md
          echo "Generated PR body:"
          cat pr-body.md

      - name: Create Pull Request
        if: steps.changes.outputs.created == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: daily-digest/${{ steps.changes.outputs.date }}
          base: main
          commit-message: "docs: daily tech digest - ${{ steps.changes.outputs.date }}"
          title: "📰 Daily Digest - ${{ steps.changes.outputs.date }}"
          body-path: pr-body.md
          draft: true
          add-paths: |
            src/content/posts/*.md
            src/content/posts/.digest-data/*.json
          delete-branch: true
