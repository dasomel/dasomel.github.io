name: Digest Fallback Merge

# 매일 08:00 UTC (= 17:00 KST) 실행.
# Cowork 보강 태스크가 돌지 않아 draft PR이 남아 있으면 그대로 머지해 발행한다.
# 이미 머지됐거나 draft PR이 없으면 아무 작업도 하지 않는다.

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fallback-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge stale draft digest PR (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          echo "Looking for draft Daily Digest PR for ${TODAY}..."

          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --draft \
            --json number,title \
            --jq ".[] | select(.title | test(\"${TODAY}\")) | .number" 2>/dev/null || true)

          if [ -z "$PR" ]; then
            echo "No draft digest PR found for ${TODAY}. Already merged or nothing collected."
            exit 0
          fi

          echo "Found draft PR #${PR} — converting to ready and merging..."
          gh pr ready "$PR" --repo "${{ github.repository }}"
          gh pr merge "$PR" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --subject "📰 데일리 테크 다이제스트 ${TODAY} (fallback — AI 보강 없이 발행)"
          echo "Done: PR #${PR} merged."
