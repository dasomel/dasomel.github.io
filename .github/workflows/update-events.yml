name: Update Seoul Events

on:
  schedule:
    # 23:30 UTC = 08:30 KST — morning refresh before people browse
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Seoul events
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: node scripts/fetch-seoul-events.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/content/events/data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in events data."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            COUNT=$(node -e "const d=require('./src/content/events/data.json');console.log(d.events.length)")
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/events/data.json
          git commit -m "chore(events): 서울 행사 데이터 업데이트 — ${{ steps.changes.outputs.count }}건 ($(TZ=Asia/Seoul date +%F))"
          git push
